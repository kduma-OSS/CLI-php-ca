name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*-src' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  prepare:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG="${TAG#v}"
          TAG="${TAG%-src}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: always() && !failure() && !cancelled()
    uses: kduma-OSS/GH-shared-workflows/.github/workflows/laravel-zero-build.yml@v1
    with:
      php-version: '8.4'
      binary-name: 'php-ca'
      release: ${{ needs.prepare.outputs.version != '' }}
      version: ${{ needs.prepare.outputs.version || '' }}
      src-tag-name: v${{ needs.prepare.outputs.version }}-src
      bin-tag-name: v${{ needs.prepare.outputs.version }}
      build-binaries: true
    permissions:
      contents: write
